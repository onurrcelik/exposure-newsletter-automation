<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Exposure Newsletter{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            zinc: {
              925: '#111113',
              950: '#09090b',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.5);
      cursor: pointer;
    }
    .upload-zone { position: relative; }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.2s ease-out; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <!-- Nav -->
  <nav class="border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-sm sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-6 h-14 flex items-center gap-4">
      <a href="/" class="flex items-center gap-2.5 group">
        <img src="/static/exposure-logo.svg" alt="Exposure" class="h-7 w-auto" />
      </a>
      <div class="h-4 w-px bg-zinc-700"></div>
      <span class="text-zinc-400 text-sm font-medium">Newsletter Dashboard</span>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-10 pb-20">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
